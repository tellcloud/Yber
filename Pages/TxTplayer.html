<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>印章使用审批表</title>

    <link rel="stylesheet" href="../Styles/TxTplayer.css">
</head>

<body>
    <div class="showtable">
        <h1>印章使用审批表</h1>
        <table>
            <!-- <tr> 表示 表格行<td> 表示 表格单元格（Table Data Cell），其中 colspan="3"，用于让单元格跨越多列 -->
            <tr>
                <td class="label">主题</td>
                <td colspan="3" class="input-cell" contenteditable="true"></td>

            </tr>
            <tr>
                <td class="label">申请部门</td>
                <td class="input-cell" contenteditable="true"></td>
                <td class="label">申请日期</td>
                <td class="input-cell" contenteditable="true"></td>
            </tr>
            <tr>
                <td class="label">经办人</td>
                <td class="input-cell" contenteditable="true"></td>
                <td class="label">用印数量</td>
                <td class="input-cell" contenteditable="true"></td>
            </tr>
            <tr>
                <td class="label">使用印章<br>名称</td>
                <td colspan="3" class="checkbox-group">
                    <div>
                        ____集团：
                        <input type="checkbox">党委章</input>
                        <input type="checkbox">公章</input>
                        <input type="checkbox">法定代表人章</input>
                        <input type="checkbox">合同专用章</input>
                        <input type="checkbox">证明专用章</input>
                    </div>
                    <div style="margin-top: 8px;">
                        ____集团：
                        <input type="checkbox">党委章</input>
                        <input type="checkbox">公章</input>
                        <input type="checkbox">法定代表人章</input>
                    </div>
                    <!-- <div style="margin-top: 8px;">
                        ____集团：
                        <input type="checkbox">党委章</input>
                        <input type="checkbox">公章</input>
                        <input type="checkbox">法定代表人章</input>
                    </div> -->
                </td>
            </tr>
            <tr>
                <td class="label">文件名称</td>
                <td colspan="3" class="input-cell" contenteditable="true"></td>
            </tr>
            <tr>
                <td class="label">用印事由</td>
                <td colspan="3" class="input-cell"> 
                    <button id="fileButton">选择文件</button>
                    <input type="file" id="fileInput" accept=".txt" style="display: none;">
                    <div id="contentDiv" style="max-height: 200px; max-width: 550px; overflow-y: auto; overflow-x: auto; padding: 4px;" contenteditable="true">
                        支持导入TXT格式文件
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label">是否携带印章外出</td>
                <td>
                    <input type="checkbox" id="out-yes"> <label for="out-yes">是</label>
                    <input type="checkbox" id="out-no" style="margin-left: 15px;"> <label for="out-no">否</label>
                </td>
                <td class="label">借出时间</td>
                <td class="input-cell" contenteditable="true">年&nbsp;&nbsp;&nbsp;月&nbsp;&nbsp;&nbsp;日</td>
            </tr>
            <tr>
                <td class="label">用印部门<br>负责人审核</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">综合管理部<br>审核</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">相关部门意见</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">分管领导审核</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">党委副书记、总经理审批</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">党委书记、董事长审批</td>
                <td colspan="3" class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">印章管理人签字</td>
                <td class="input-cell"></td>
                <td class="label">经办人签字</td>
                <td class="input-cell"></td>
            </tr>
            <tr>
                <td class="label">归还时间：</td>
                <td colspan="3" class="input-cell">
                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;年&nbsp;&nbsp;&nbsp;&nbsp;月&nbsp;&nbsp;&nbsp;&nbsp;日
                </td>
            </tr>
        </table>
    </div>

    <script src="../Scripts/TxTplayer.js"></script>
</body>

</html>
